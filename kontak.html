<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Form Konseling - Bersama Mas Munib</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  letter-spacing:0.2px;
  line-height:1.4;

  background:#4b0000;
  color:white;

  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  padding:40px 15px;
  box-sizing:border-box;
}

.box{
  width:100%;
  max-width:480px;

  background:rgba(255,255,255,0.10);
  padding:30px;

  border-radius:18px;

  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.15);

  box-shadow:0 15px 35px rgba(0,0,0,0.35);
}

.logo{
  width:80px;
  display:block;
  margin:0 auto 15px auto;
  opacity:0.9;
}

h2{
  text-align:center;
  margin-bottom:20px;
  color:#ffd7d7;
  font-size:20px;
  font-weight:700;
  letter-spacing:0.5px;
}

input, textarea{
  width:100%;
  padding:12px;

  margin-bottom:12px;

  border:none;
  border-radius:10px;

  outline:none;
  font-size:14px;

  background:rgba(255,255,255,0.9);
  font-family: inherit;
}

input[type="datetime-local"]{
  width:100%;
  padding:12px;
  margin-bottom:12px;

  border:none;
  border-radius:10px;

  outline:none;
  font-size:14px;

  background:rgba(255,255,255,0.9);
  font-family: inherit;
}

textarea{
  height:100px;
  resize:none;
}

/* tombol */
button{
  width:100%;
  padding:13px;

  border:none;
  border-radius:12px;

  background:#ffdddd;
  color:#7a0000;
  font-weight:bold;

  cursor:pointer;
  transition:0.3s;
  font-family: inherit;
}

button:hover{
  background:#ffc7c7;
  transform:translateY(-2px);
}

small{
  display:block;
  text-align:center;
  margin-top:10px;
  color:#ffcccc;
  font-size:12px;
}
</style>
</head>

<body>

<div class="box">

  <img src="white-logo.png" class="logo" alt="logo cordova">

  <h2>Form Konseling Mas Munib</h2>

  <input type="text" id="nama" placeholder="Nama lengkap">
  <input type="number" id="umur" placeholder="Umur">
  <input type="text" id="alamat" placeholder="Alamat">

  <textarea id="cerita" placeholder="Ceritakan sedikit masalahmu"></textarea>

  <input type="datetime-local" id="jadwal">

  <button onclick="kirimWA()">Kirim ke WhatsApp</button>

  <small>
    Respon 1x12 jam, tergantung kesediaan konselor
  </small>
</div>

<script>
function kirimWA(){

  let nama = document.getElementById("nama").value;
  let umur = document.getElementById("umur").value;
  let alamat = document.getElementById("alamat").value;
  let cerita = document.getElementById("cerita").value;
  let jadwalRaw = document.getElementById("jadwal").value;

  if(!nama || !umur || !alamat || !cerita || !jadwalRaw){
    alert("Lengkapi semua data dulu ya");
    return;
  }

  let jadwal = new Date(jadwalRaw).toLocaleString("id-ID", {
    dateStyle: "full",
    timeStyle: "short"
  });

  let now = new Date();
  let tanggal = now.toLocaleDateString("id-ID");
  let waktu = now.toLocaleTimeString("id-ID");

  let jam = now.getHours();

  let respon = (jam >= 6 && jam < 18)
    ? "akan dibalas malam (±12 jam)"
    : "akan dibalas pagi (±12 jam)";

  let pesan =
`FORM KONSELING MAS MUNIB

Tanggal Kirim: ${tanggal}
Waktu Kirim: ${waktu}

Nama: ${nama}
Umur: ${umur}
Alamat: ${alamat}

Cerita:
${cerita}

Jadwal Konseling:
${jadwal}

Estimasi respon: ${respon}

Sistem: respon 1x12 jam`;

  let nomor = "6285232259397";

  let url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);

  window.open(url, "_blank");
}
</script>

</body>
</html>
